<div class="history-toggle-container" *ngIf="!showHistory">
  <button (click)="onToggleHistory()" class="btn btn-toggle-history">
    View Analysis History ({{ analyses.length }})
  </button>
</div>

<!-- Toast notification -->
<div class="toast-container" *ngIf="toast" [ngClass]="'toast-' + toast.type">
  {{ toast.message }}
</div>

<section class="results-section" #resultsSection *ngIf="showHistory">
  <div class="section-header">
    <div class="header-with-toggle">
      <h2>Analysis history</h2>
      <button (click)="onToggleHistory()" class="toggle-btn" title="Hide history">
        ✕
      </button>
    </div>
    <p class="section-desc">Your previous image analyses</p>
  </div>

  <!-- Skeleton loading -->
  <div *ngIf="loading" class="analysis-grid">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="skeleton-header"></div>
      <div class="skeleton-body">
        <div class="skeleton-stats">
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
        </div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && (!analyses || analyses.length === 0)" class="empty-state">
    <div class="empty-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="9" r="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h3>No analyses yet</h3>
    <p>Upload an image above to get started</p>
  </div>

  <div class="analysis-grid" *ngIf="!loading && analyses && analyses.length > 0">
    <app-analysis-card
      *ngFor="let analysis of analyses; trackBy: trackByAnalysisId"
      [analysis]="analysis"
      (deleteRequested)="deleteAnalysis($event)">
    </app-analysis-card>
  </div>
</section>
