<section class="upload-section">
  <div class="section-header">
    <h2>Upload Image for Analysis</h2>
    <p class="section-desc">Drag and drop or click to upload your image</p>
  </div>

  <div class="upload-area" 
    (click)="fileInput.click()"
    (drop)="onDrop($event)"
    (dragover)="dragOver = true"
    (dragleave)="dragOver = false"
    [class.drag-over]="dragOver">
    
    <input #fileInput type="file" 
      accept="image/*" 
      (change)="onFileSelected($event)"
      hidden
    />
    
    <div *ngIf="!selectedFile" class="upload-placeholder">
      <div class="upload-icon">📁</div>
      <p class="upload-main">Click to select or drag & drop</p>
      <p class="upload-hint">Supported: JPG, PNG, GIF, WebP (Max 10MB)</p>
    </div>
    
    <div *ngIf="selectedFile" class="file-preview">
      <div class="preview-icon">✓</div>
      <p class="file-name">{{ selectedFile.name }}</p>
      <p class="file-size">{{ (selectedFile.size / 1024 / 1024).toFixed(2) }} MB</p>
    </div>
  </div>

  <div class="button-group">
    <button (click)="uploadImage()" 
      [disabled]="!selectedFile || uploading"
      class="btn btn-primary">
      <span *ngIf="!uploading">Upload & Analyze</span>
      <span *ngIf="uploading" class="loading-spinner">
        <span class="spinner"></span> Uploading...
      </span>
    </button>
    <button (click)="clearFile()" 
      [disabled]="!selectedFile || uploading"
      class="btn btn-secondary">
      Clear
    </button>
  </div>

  <div class="message-group">
    <p class="error-message" *ngIf="uploadError">
      <span class="icon">⚠️</span> {{ uploadError }}
    </p>
    <p class="success-message" *ngIf="uploadSuccess">
      <span class="icon">✓</span> {{ uploadSuccess }}
    </p>
  </div>
</section>
